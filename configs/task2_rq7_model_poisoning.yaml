seed: 42
device: auto

dataset:
  name: FD001
  data_dir: data/raw/CMAPSSData
  url: https://phm-datasets.s3.amazonaws.com/NASA/6.+Turbofan+Engine+Degradation+Simulation+Data+Set.zip
  download: false
  sensors:
    - s2
    - s3
    - s4
    - s7
    - s8
    - s9
    - s11
    - s12
    - s13
    - s14
    - s15
    - s17
    - s20
    - s21
  rul_cap: 125
  fault_threshold: 30
  window_size: 30
  stride: 1
  validation_engine_fraction: 0.2

federated:
  num_clients: 5
  partition_strategy: iid
  rounds: 30
  local_epochs: 1
  batch_size: 128
  learning_rate: 0.001
  fault_loss_weight: 1.0

rq7:
  malicious_client_id: 0
  methods:
    - clean_fedavg
    - poisoned_fedavg
    - poisoned_clipping
    - poisoned_median
    - poisoned_trimmed_mean
    - poisoned_detection_filter
  poison_fault_only: true
  poison_fraction: 1.0
  rul_boost: 80.0
  malicious_fault_label: 0.0
  clip_norm: 1.0
  trimmed_mean_ratio: 0.2
  detection_norm_mad_k: 3.0
  detection_rmse_ratio: 1.25
  detection_auprc_drop: 0.2

model:
  conv_channels:
    - 64
    - 128
  kernel_size: 3
  gru_hidden: 128
  dropout: 0.2

outputs:
  results_dir: experiments/logs
